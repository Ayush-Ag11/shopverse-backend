services:
  postgres:
    image: postgres:17.5
    container_name: shopverse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopverse_db}
      POSTGRES_USER: ${POSTGRES_USER:-shopverse_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopverse_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - shopverse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-shopverse_user} -d ${POSTGRES_DB:-shopverse_db}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  shopverse_postgres_data:
